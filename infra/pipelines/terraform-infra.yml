# ============================================================
#  terraform-infra.yml
#  Pipeline de Azure DevOps — Infraestructura Terraform
#
#  Flujo:
#    1. Validate  → terraform fmt + validate (ambos entornos)
#    2. Plan Dev  → terraform plan del entorno dev
#    3. Apply Dev → terraform apply automático (rama main/dev)
#    4. Plan Prod → terraform plan del entorno prod
#    5. Apply Prod→ terraform apply con aprobación manual
#
#  Autenticación: AWS Service Connection
#    (ver bootstrap.yml para instrucciones de configuración)
#
#  Variables sensibles (configurar en Azure DevOps Library):
#    Grupo de variables: "sistema-votaciones-secrets"
#      - DB_HOST
#      - DB_USERNAME
#      - DB_PASSWORD
#      - JWT_SECRET_VALUE
# ============================================================

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - infra/terraform/**
      - infra/pipelines/terraform-infra.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/terraform/**

pool:
  vmImage: ubuntu-latest

variables:
  - group: sistema-votaciones-secrets   # Grupo de variables del Library con los secretos
  - name: awsServiceConnection
    value: "aws-sistema-votaciones"
  - name: awsRegion
    value: "us-east-1"
  - name: terraformVersion
    value: "1.7.5"

# ── Templates reutilizables (inline via steps) ─────────────

stages:
  # ────────────────────────────────────────────────────────
  #  Stage 1: Validate (fmt + validate, ambos entornos)
  # ────────────────────────────────────────────────────────
  - stage: Validate
    displayName: "Validate — fmt & validate"
    jobs:
      - job: TerraformValidate
        displayName: "terraform fmt + validate"
        steps:
          - checkout: self
            displayName: "Checkout"

          - task: TerraformInstaller@1
            displayName: "Instalar Terraform $(terraformVersion)"
            inputs:
              terraformVersion: $(terraformVersion)

          - script: |
              echo "── Verificando formato ──────────────────────────"
              terraform fmt -check -recursive infra/terraform/
              echo "✓ Formato OK"
            displayName: "terraform fmt -check"
            continueOnError: false

          - task: AWSShellScript@1
            displayName: "terraform validate (dev)"
            inputs:
              awsCredentials: $(awsServiceConnection)
              regionName: $(awsRegion)
              scriptType: inline
              inlineScript: |
                set -euo pipefail
                cd infra/terraform/environments/dev
                terraform init -backend=false
                terraform validate
                echo "✓ Validate dev OK"

          - task: AWSShellScript@1
            displayName: "terraform validate (prod)"
            inputs:
              awsCredentials: $(awsServiceConnection)
              regionName: $(awsRegion)
              scriptType: inline
              inlineScript: |
                set -euo pipefail
                cd infra/terraform/environments/prod
                terraform init -backend=false
                terraform validate
                echo "✓ Validate prod OK"

  # ────────────────────────────────────────────────────────
  #  Stage 2: Plan Dev
  # ────────────────────────────────────────────────────────
  - stage: PlanDev
    displayName: "Plan — dev"
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: TerraformPlanDev
        displayName: "terraform plan (dev)"
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: "Instalar Terraform $(terraformVersion)"
            inputs:
              terraformVersion: $(terraformVersion)

          - task: AWSShellScript@1
            displayName: "terraform init + plan (dev)"
            inputs:
              awsCredentials: $(awsServiceConnection)
              regionName: $(awsRegion)
              scriptType: inline
              inlineScript: |
                set -euo pipefail
                cd infra/terraform/environments/dev

                echo "── terraform init ───────────────────────────────"
                terraform init -input=false

                echo "── terraform plan ───────────────────────────────"
                terraform plan \
                  -input=false \
                  -out=tfplan-dev \
                  -var="db_host=${DB_HOST}" \
                  -var="db_username=${DB_USERNAME}" \
                  -var="db_password=${DB_PASSWORD}" \
                  -var="jwt_secret_value=${JWT_SECRET_VALUE}"

                echo "✓ Plan dev generado"
            env:
              DB_HOST: $(DB_HOST)
              DB_USERNAME: $(DB_USERNAME)
              DB_PASSWORD: $(DB_PASSWORD)
              JWT_SECRET_VALUE: $(JWT_SECRET_VALUE)

          # Publicar el plan como artefacto para apply
          - publish: infra/terraform/environments/dev/tfplan-dev
            artifact: tfplan-dev
            displayName: "Publicar plan dev"

  # ────────────────────────────────────────────────────────
  #  Stage 3: Apply Dev (automático en rama main/develop)
  # ────────────────────────────────────────────────────────
  - stage: ApplyDev
    displayName: "Apply — dev"
    dependsOn: PlanDev
    condition: >
      and(
        succeeded(),
        or(
          eq(variables['Build.SourceBranch'], 'refs/heads/main'),
          eq(variables['Build.SourceBranch'], 'refs/heads/develop')
        )
      )
    jobs:
      - deployment: TerraformApplyDev
        displayName: "terraform apply (dev)"
        environment: "dev"    # Entorno Azure DevOps — configura approval si se desea
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: "Instalar Terraform $(terraformVersion)"
                  inputs:
                    terraformVersion: $(terraformVersion)

                - download: current
                  artifact: tfplan-dev
                  displayName: "Descargar plan dev"

                - task: AWSShellScript@1
                  displayName: "terraform apply (dev)"
                  inputs:
                    awsCredentials: $(awsServiceConnection)
                    regionName: $(awsRegion)
                    scriptType: inline
                    inlineScript: |
                      set -euo pipefail
                      cd infra/terraform/environments/dev

                      echo "── terraform init ───────────────────────────────"
                      terraform init -input=false

                      echo "── terraform apply ──────────────────────────────"
                      # Recrea el plan por seguridad (el artefacto es solo referencia)
                      terraform apply \
                        -input=false \
                        -auto-approve \
                        -var="db_host=${DB_HOST}" \
                        -var="db_username=${DB_USERNAME}" \
                        -var="db_password=${DB_PASSWORD}" \
                        -var="jwt_secret_value=${JWT_SECRET_VALUE}"

                      echo ""
                      echo "── Outputs ──────────────────────────────────────"
                      terraform output
                  env:
                    DB_HOST: $(DB_HOST)
                    DB_USERNAME: $(DB_USERNAME)
                    DB_PASSWORD: $(DB_PASSWORD)
                    JWT_SECRET_VALUE: $(JWT_SECRET_VALUE)

  # ────────────────────────────────────────────────────────
  #  Stage 4: Plan Prod
  # ────────────────────────────────────────────────────────
  - stage: PlanProd
    displayName: "Plan — prod"
    dependsOn: ApplyDev
    condition: >
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - job: TerraformPlanProd
        displayName: "terraform plan (prod)"
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: "Instalar Terraform $(terraformVersion)"
            inputs:
              terraformVersion: $(terraformVersion)

          - task: AWSShellScript@1
            displayName: "terraform init + plan (prod)"
            inputs:
              awsCredentials: $(awsServiceConnection)
              regionName: $(awsRegion)
              scriptType: inline
              inlineScript: |
                set -euo pipefail
                cd infra/terraform/environments/prod

                echo "── terraform init ───────────────────────────────"
                terraform init -input=false

                echo "── terraform plan ───────────────────────────────"
                terraform plan \
                  -input=false \
                  -out=tfplan-prod \
                  -var="db_host=${DB_HOST}" \
                  -var="db_username=${DB_USERNAME}" \
                  -var="db_password=${DB_PASSWORD}" \
                  -var="jwt_secret_value=${JWT_SECRET_VALUE}"

                echo "✓ Plan prod generado"
            env:
              DB_HOST: $(DB_HOST)
              DB_USERNAME: $(DB_USERNAME)
              DB_PASSWORD: $(DB_PASSWORD)
              JWT_SECRET_VALUE: $(JWT_SECRET_VALUE)

          - publish: infra/terraform/environments/prod/tfplan-prod
            artifact: tfplan-prod
            displayName: "Publicar plan prod"

  # ────────────────────────────────────────────────────────
  #  Stage 5: Apply Prod — requiere aprobación manual
  # ────────────────────────────────────────────────────────
  - stage: ApplyProd
    displayName: "Apply — prod (requiere aprobación)"
    dependsOn: PlanProd
    condition: >
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - deployment: TerraformApplyProd
        displayName: "terraform apply (prod)"
        # El entorno 'prod' en Azure DevOps debe tener configurada
        # una 'Approval check' con los aprobadores del equipo.
        environment: "prod"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: "Instalar Terraform $(terraformVersion)"
                  inputs:
                    terraformVersion: $(terraformVersion)

                - download: current
                  artifact: tfplan-prod
                  displayName: "Descargar plan prod"

                - task: AWSShellScript@1
                  displayName: "terraform apply (prod)"
                  inputs:
                    awsCredentials: $(awsServiceConnection)
                    regionName: $(awsRegion)
                    scriptType: inline
                    inlineScript: |
                      set -euo pipefail
                      cd infra/terraform/environments/prod

                      echo "── terraform init ───────────────────────────────"
                      terraform init -input=false

                      echo "── terraform apply ──────────────────────────────"
                      terraform apply \
                        -input=false \
                        -auto-approve \
                        -var="db_host=${DB_HOST}" \
                        -var="db_username=${DB_USERNAME}" \
                        -var="db_password=${DB_PASSWORD}" \
                        -var="jwt_secret_value=${JWT_SECRET_VALUE}"

                      echo ""
                      echo "── Outputs ──────────────────────────────────────"
                      terraform output
                  env:
                    DB_HOST: $(DB_HOST)
                    DB_USERNAME: $(DB_USERNAME)
                    DB_PASSWORD: $(DB_PASSWORD)
                    JWT_SECRET_VALUE: $(JWT_SECRET_VALUE)
