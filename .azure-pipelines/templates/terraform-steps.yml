# Pasos reutilizables de Terraform con AWS Service Connection.
# Soporta: validate | plan | apply

parameters:
  - name: environment
    type: string
    default: dev
  - name: tfCommand
    type: string
  - name: savePlan
    type: boolean
    default: false
  - name: awsServiceConnection
    type: string
    default: "aws-sistema-votaciones"
  - name: awsRegion
    type: string
    default: "us-east-1"

steps:
  - checkout: self
    fetchDepth: 1

  - ${{ if eq(parameters.tfCommand, 'validate') }}:
    - task: AWSShellScript@1
      displayName: "terraform fmt + validate (${{ parameters.environment }})"
      inputs:
        awsCredentials: ${{ parameters.awsServiceConnection }}
        regionName: ${{ parameters.awsRegion }}
        scriptType: inline
        inlineScript: |
          set -euo pipefail

          TF_VERSION="$(TF_VERSION)"
          if ! terraform version 2>/dev/null | grep -q "${TF_VERSION}"; then
            curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" \
              -o /tmp/terraform.zip
            unzip -o /tmp/terraform.zip -d /usr/local/bin/
            chmod +x /usr/local/bin/terraform
          fi

          cd "$(TF_ROOT)/${{ parameters.environment }}"
          terraform fmt -check -recursive ../../
          terraform init -backend=false -input=false
          terraform validate

  - ${{ if eq(parameters.tfCommand, 'plan') }}:
    - task: AWSShellScript@1
      displayName: "terraform init + plan (${{ parameters.environment }})"
      inputs:
        awsCredentials: ${{ parameters.awsServiceConnection }}
        regionName: ${{ parameters.awsRegion }}
        scriptType: inline
        inlineScript: |
          set -euo pipefail

          TF_VERSION="$(TF_VERSION)"
          if ! terraform version 2>/dev/null | grep -q "${TF_VERSION}"; then
            curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" \
              -o /tmp/terraform.zip
            unzip -o /tmp/terraform.zip -d /usr/local/bin/
            chmod +x /usr/local/bin/terraform
          fi

          cd "$(TF_ROOT)/${{ parameters.environment }}"
          terraform init -input=false
          terraform plan \
            -input=false \
            -var-file="terraform.tfvars" \
            -out="$(Build.ArtifactStagingDirectory)/tfplan-${{ parameters.environment }}"
          terraform show -no-color \
            "$(Build.ArtifactStagingDirectory)/tfplan-${{ parameters.environment }}" | tail -20

    - ${{ if parameters.savePlan }}:
      - publish: $(Build.ArtifactStagingDirectory)
        artifact: tfplan-${{ parameters.environment }}
        displayName: "Publicar plan (${{ parameters.environment }})"

  - ${{ if eq(parameters.tfCommand, 'apply') }}:
    - download: current
      artifact: tfplan-${{ parameters.environment }}
      displayName: "Descargar plan (${{ parameters.environment }})"

    - task: AWSShellScript@1
      displayName: "terraform apply (${{ parameters.environment }})"
      inputs:
        awsCredentials: ${{ parameters.awsServiceConnection }}
        regionName: ${{ parameters.awsRegion }}
        scriptType: inline
        inlineScript: |
          set -euo pipefail

          TF_VERSION="$(TF_VERSION)"
          if ! terraform version 2>/dev/null | grep -q "${TF_VERSION}"; then
            curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" \
              -o /tmp/terraform.zip
            unzip -o /tmp/terraform.zip -d /usr/local/bin/
            chmod +x /usr/local/bin/terraform
          fi

          cd "$(TF_ROOT)/${{ parameters.environment }}"
          terraform init -input=false
          terraform apply \
            -input=false \
            -auto-approve \
            "$(Pipeline.Workspace)/tfplan-${{ parameters.environment }}/tfplan-${{ parameters.environment }}"
          terraform output

