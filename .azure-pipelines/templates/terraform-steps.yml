# ============================================================
#  Template: terraform-steps.yml
#  Pasos reutilizables para instalar Terraform y ejecutar
#  un comando (validate, plan, apply) sobre un entorno dado.
# ============================================================

parameters:
  - name: environment
    type: string                   # dev | prod
  - name: tfCommand
    type: string                   # validate | plan | apply
  - name: savePlan
    type: boolean
    default: false

steps:
  - checkout: self
    fetchDepth: 1

  # ── Instalar Terraform ───────────────────────────────────
  - script: |
      set -euo pipefail
      TERRAFORM_VERSION="$(TF_VERSION)"
      TF_BIN="$HOME/.terraform-bin"
      mkdir -p "$TF_BIN"

      if ! command -v terraform &>/dev/null || \
         [ "$(terraform version -json | python3 -c 'import sys,json; print(json.load(sys.stdin)["terraform_version"])')" != "$TERRAFORM_VERSION" ]; then
        echo "Descargando Terraform ${TERRAFORM_VERSION}..."
        curl -fsSL "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip" \
          -o /tmp/terraform.zip
        unzip -o /tmp/terraform.zip -d "$TF_BIN"
        chmod +x "$TF_BIN/terraform"
      else
        echo "Terraform ${TERRAFORM_VERSION} ya instalado."
      fi

      echo "##vso[task.prependpath]$TF_BIN"
      terraform version
    displayName: 'Instalar Terraform $(TF_VERSION)'

  # ── Configurar credenciales AWS ──────────────────────────
  - script: |
      echo "##vso[task.setvariable variable=AWS_ACCESS_KEY_ID]$(AWS_ACCESS_KEY_ID)"
      echo "##vso[task.setvariable variable=AWS_SECRET_ACCESS_KEY]$(AWS_SECRET_ACCESS_KEY)"
      echo "##vso[task.setvariable variable=AWS_DEFAULT_REGION]$(AWS_DEFAULT_REGION)"
    displayName: 'Configurar credenciales AWS'

  # ── terraform init ───────────────────────────────────────
  - script: |
      set -euo pipefail
      cd "$(TF_ROOT)/${{ parameters.environment }}"
      terraform init -input=false
    displayName: 'terraform init (${{ parameters.environment }})'
    env:
      AWS_ACCESS_KEY_ID:     $(AWS_ACCESS_KEY_ID)
      AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
      AWS_DEFAULT_REGION:    $(AWS_DEFAULT_REGION)

  # ── terraform validate ───────────────────────────────────
  - ${{ if eq(parameters.tfCommand, 'validate') }}:
    - script: |
        set -euo pipefail
        cd "$(TF_ROOT)/${{ parameters.environment }}"
        terraform fmt -check -recursive
        terraform validate
      displayName: 'terraform validate (${{ parameters.environment }})'
      env:
        AWS_ACCESS_KEY_ID:     $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_DEFAULT_REGION:    $(AWS_DEFAULT_REGION)

  # ── terraform plan ───────────────────────────────────────
  - ${{ if eq(parameters.tfCommand, 'plan') }}:
    - script: |
        set -euo pipefail
        cd "$(TF_ROOT)/${{ parameters.environment }}"
        terraform plan \
          -input=false \
          -var-file="terraform.tfvars" \
          -out="$(Build.ArtifactStagingDirectory)/tfplan-${{ parameters.environment }}"
      displayName: 'terraform plan (${{ parameters.environment }})'
      env:
        AWS_ACCESS_KEY_ID:     $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_DEFAULT_REGION:    $(AWS_DEFAULT_REGION)

    - ${{ if parameters.savePlan }}:
      - publish: $(Build.ArtifactStagingDirectory)
        artifact: tfplan-${{ parameters.environment }}
        displayName: 'Publicar plan (${{ parameters.environment }})'

  # ── terraform apply ──────────────────────────────────────
  - ${{ if eq(parameters.tfCommand, 'apply') }}:
    - download: current
      artifact: tfplan-${{ parameters.environment }}
      displayName: 'Descargar plan (${{ parameters.environment }})'

    - script: |
        set -euo pipefail
        cd "$(TF_ROOT)/${{ parameters.environment }}"
        terraform apply \
          -input=false \
          -auto-approve \
          "$(Pipeline.Workspace)/tfplan-${{ parameters.environment }}/tfplan-${{ parameters.environment }}"
      displayName: 'terraform apply (${{ parameters.environment }})'
      env:
        AWS_ACCESS_KEY_ID:     $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_DEFAULT_REGION:    $(AWS_DEFAULT_REGION)
