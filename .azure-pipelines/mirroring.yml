# ============================================================
#  mirroring.yml
#  Mirror de Azure DevOps → GitHub
#
#  Cada push a `main` en Azure DevOps replica el contenido
#  a la rama `main` de github.com/llimaix/SistemaVotaciones
#
#  Configuración requerida (una sola vez):
#  ─────────────────────────────────────────────────────────
#  1. Crear un GitHub Personal Access Token (PAT):
#     GitHub → Settings → Developer Settings
#     → Fine-grained tokens → New token
#     → Permisos: Contents: Read and Write
#       (solo el repo llimaix/SistemaVotaciones)
#
#  2. Guardar el PAT como variable secreta en ESTE pipeline:
#     Pipeline → Edit → Variables → (+)
#     → Nombre: GITHUB_PAT
#     → Valor: el token
#     → ✅ Keep this value secret
#     → Guardar
#
#  Sin Library. Sin Variable Groups.
# ============================================================

trigger:
  branches:
    include:
      - main   # Solo main dispara el mirror

pr: none

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    displayName: "Checkout completo"
    fetchDepth: 0
    persistCredentials: true

  - script: |
      set -euo pipefail

      git config user.email "azure-mirror-bot@noreply.com"
      git config user.name  "Azure Mirror Bot"

      GITHUB_URL="https://$(GITHUB_PAT)@github.com/llimaix/SistemaVotaciones.git"

      git remote add github "$GITHUB_URL" 2>/dev/null \
        || git remote set-url github "$GITHUB_URL"

      echo "── Pushing main → github.com/llimaix/SistemaVotaciones ──"
      git push github "HEAD:refs/heads/main"

      echo "✅ Mirror completado"
    displayName: "Mirror → GitHub main"
    env:
      GITHUB_PAT: $(GITHUB_PAT)
