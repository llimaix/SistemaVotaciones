trigger:
  branches:
    include:
      - main   # Solo dispara cuando llegan cambios a main

pr: none   # No corre en Pull Requests

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    fetchDepth: 0
    persistCredentials: true

  - script: |
      set -euo pipefail

      git config user.email "azure-mirror-bot@noreply.com"
      git config user.name  "Azure Mirror Bot"

      GITHUB_URL="https://${GITHUB_TOKEN}@${GITHUB_REPO}"

      git remote add github "$GITHUB_URL" 2>/dev/null \
        || git remote set-url github "$GITHUB_URL"

      echo "── Pushing main → ${GITHUB_REPO} ──"
      git push github HEAD:refs/heads/main --force

      echo "✅ Mirror completado exitosamente."
    displayName: 'Mirror → GitHub main'
    env:
      GITHUB_TOKEN: $(GITHUB_TOKEN)
      GITHUB_REPO:  $(GITHUB_REPO)
