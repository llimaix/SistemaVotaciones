trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - infra/terraform/**
      - infra/scripts/**
      - .azure-pipelines/terraform.yml
      - .azure-pipelines/templates/**

pr:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - infra/terraform/**

pool:
  vmImage: ubuntu-latest

variables:
  TF_VERSION: "1.7.5"
  TF_ROOT: "$(Build.SourcesDirectory)/infra/terraform/environments"
  AWS_SERVICE_CONNECTION: "aws-sistema-votaciones"
  AWS_REGION: "us-east-1"

stages:

  # ────────────────────────────────────────────────────────
  #  STAGE 0: Bootstrap
  #  Idempotente — crea el bucket S3 y la tabla DynamoDB
  #  solo si no existen. Seguro de ejecutar siempre.
  # ────────────────────────────────────────────────────────
  - stage: Bootstrap
    displayName: "⚙️ Bootstrap Remote State"
    condition: ne(variables['Build.Reason'], 'PullRequest')
    jobs:
      - job: Bootstrap
        displayName: "Bucket S3 + DynamoDB para TF state"
        steps:
          - checkout: self
            fetchDepth: 1

          - task: AWSShellScript@1
            displayName: "Ejecutar bootstrap.sh"
            inputs:
              awsCredentials: $(AWS_SERVICE_CONNECTION)
              regionName: $(AWS_REGION)
              scriptType: filePath
              filePath: "infra/scripts/bootstrap.sh"

  # ────────────────────────────────────────────────────────
  #  STAGE 1: Validate — fmt -check + terraform validate
  #  Corre en push y en PRs
  # ────────────────────────────────────────────────────────
  - stage: Validate
    displayName: "🔍 Validate"
    dependsOn: []   # No depende de Bootstrap (también corre en PRs)
    jobs:
      - job: ValidateDev
        displayName: "Validate DEV"
        steps:
          - template: templates/terraform-steps.yml
            parameters:
              environment: dev
              tfCommand: validate
              awsServiceConnection: $(AWS_SERVICE_CONNECTION)
              awsRegion: $(AWS_REGION)

  # ────────────────────────────────────────────────────────
  #  STAGE 2: Plan — genera el tfplan
  #  Solo en push (no en PRs)
  # ────────────────────────────────────────────────────────
  - stage: Plan
    displayName: "📋 Plan DEV"
    dependsOn:
      - Bootstrap
      - Validate
    condition: |
      and(
        succeeded('Validate'),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - job: PlanDev
        displayName: "terraform plan (dev)"
        steps:
          - template: templates/terraform-steps.yml
            parameters:
              environment: dev
              tfCommand: plan
              savePlan: true
              awsServiceConnection: $(AWS_SERVICE_CONNECTION)
              awsRegion: $(AWS_REGION)

  # ────────────────────────────────────────────────────────
  #  STAGE 3: Apply — aplica el plan generado
  #  Solo en push a main o develop (no en PRs)
  # ────────────────────────────────────────────────────────
  - stage: Apply
    displayName: "🚀 Apply DEV"
    dependsOn: Plan
    condition: |
      and(
        succeeded(),
        ne(variables['Build.Reason'], 'PullRequest'),
        or(
          eq(variables['Build.SourceBranchName'], 'main'),
          eq(variables['Build.SourceBranchName'], 'develop')
        )
      )
    jobs:
      - deployment: ApplyDev
        displayName: "terraform apply (dev)"
        environment: "dev"
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/terraform-steps.yml
                  parameters:
                    environment: dev
                    tfCommand: apply
                    awsServiceConnection: $(AWS_SERVICE_CONNECTION)
                    awsRegion: $(AWS_REGION)

