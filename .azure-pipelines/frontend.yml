# Pipeline de build y deploy del frontend Angular.
# Trigger: commits a main con cambios en frontend/.
# Deploy: S3 sync + invalidacion de CloudFront.
#
# Variables requeridas en el pipeline:
#   S3_FRONTEND_BUCKET  - nombre del bucket S3 (output de Terraform)
#   CLOUDFRONT_DIST_ID  - ID de la distribucion CloudFront (output de Terraform)

trigger:
  branches:
    include:
      - main                        # Dispara en cada commit a main
  paths:
    include:
      - frontend/**                 # Solo cuando hay cambios en el frontend
      - .azure-pipelines/frontend.yml

pr: none                            # No corre en Pull Requests

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '24.x'
  AWS_SERVICE_CONNECTION: 'aws-sistema-votaciones'
  AWS_REGION: 'us-east-1'
  BUILD_DIR: 'frontend/dist/sistema-votaciones/browser'

stages:

  - stage: Build
    displayName: "Build Angular"
    jobs:
      - job: Build
        displayName: "npm ci + ng build production"
        steps:
          - checkout: self
            fetchDepth: 1

          - task: NodeTool@0
            displayName: 'Instalar Node.js $(NODE_VERSION)'
            inputs:
              versionSpec: $(NODE_VERSION)

          - script: |
              cd frontend
              npm ci --prefer-offline
            displayName: 'npm ci'

          - script: |
              cd frontend
              npm run build:prod
            displayName: 'ng build --configuration production'

          - publish: $(Build.SourcesDirectory)/$(BUILD_DIR)
            artifact: frontend-dist
            displayName: 'Publicar artefacto frontend-dist'

  - stage: Deploy
    displayName: "Deploy S3 + CloudFront"
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployFrontend
        displayName: "Sync S3 + Invalidar CloudFront"
        steps:
          - download: current
            artifact: frontend-dist
            displayName: 'Descargar artefacto'

          - task: AWSShellScript@1
            displayName: "aws s3 sync + cloudfront invalidation"
            inputs:
              awsCredentials: $(AWS_SERVICE_CONNECTION)
              regionName: $(AWS_REGION)
              scriptType: inline
              inlineScript: |
                set -euo pipefail

                DIST_DIR="$(Pipeline.Workspace)/frontend-dist"

                if [ -z "${S3_FRONTEND_BUCKET:-}" ]; then
                  echo "##[error]Variable S3_FRONTEND_BUCKET no definida."
                  exit 1
                fi

                if [ -z "${CLOUDFRONT_DIST_ID:-}" ]; then
                  echo "##[error]Variable CLOUDFRONT_DIST_ID no definida."
                  exit 1
                fi

                # Archivos con hash en nombre (JS, CSS) -> cache largo
                aws s3 sync "${DIST_DIR}" "s3://${S3_FRONTEND_BUCKET}" \
                  --delete \
                  --cache-control "public,max-age=31536000,immutable" \
                  --exclude "*.html" \
                  --exclude "*.json"

                # HTML y JSON -> sin cache para que siempre se sirva la version nueva
                aws s3 sync "${DIST_DIR}" "s3://${S3_FRONTEND_BUCKET}" \
                  --cache-control "no-cache,no-store,must-revalidate" \
                  --include "*.html" \
                  --include "*.json"

                INVALIDATION_ID=$(aws cloudfront create-invalidation \
                  --distribution-id "${CLOUDFRONT_DIST_ID}" \
                  --paths "/*" \
                  --query 'Invalidation.Id' \
                  --output text)

                aws cloudfront wait invalidation-completed \
                  --distribution-id "${CLOUDFRONT_DIST_ID}" \
                  --id "${INVALIDATION_ID}"
            env:
              S3_FRONTEND_BUCKET: $(S3_FRONTEND_BUCKET)
              CLOUDFRONT_DIST_ID: $(CLOUDFRONT_DIST_ID)